name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build (client + server)
    runs-on: ubuntu-latest
    # Fake Firebase env vars so Vite can build without real credentials
    env:
      VITE_FIREBASE_API_KEY: ci-placeholder
      VITE_FIREBASE_PROJECT_ID: driiva
      VITE_FIREBASE_APP_ID: 1:000000000000:web:ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build
        run: npm run build

  functions-build:
    name: Build (Cloud Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npm run build
        working-directory: functions

      - name: Test functions
        run: npm test
        working-directory: functions

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, functions-build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build Cloud Functions
        run: npm run build
        working-directory: functions

      - name: Deploy Firestore rules and indexes to staging
        run: npx firebase deploy --only firestore:rules,firestore:indexes --project staging
        # Note: Cloud Functions deploy requires Blaze plan on driiva-staging.
        # Upgrade at: https://console.firebase.google.com/project/driiva-staging/usage/details
        # Then change the above to: --only firestore:rules,firestore:indexes,functions
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
